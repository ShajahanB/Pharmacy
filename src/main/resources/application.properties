spring.application.name=Pharmacy
server.port=9081
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create

spring.h2.console.enabled=true

spring.h2.console.path=/h2-ui

logging.level.root=INFO
logging.level.com.example=DEBUG

logging.file.name=D:/log/app.logs


spring.kafka.consumer.bootstrap-servers:localhost:9092
spring.kafka.consumer.group-id:myGroup
spring.kafka.consumer.auto-offset-reset:earliest
spring.kafka.consumer.key.deserializer:org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value.deserializer:org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.consumer.value.deserializer:org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.trusted.package=*


spring.kafka.producer.bootstrap-servers:localhost:9092
spring.kafka.producer.key.deserializer:org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.producer.value.deserializer:org.apache.kafka.common.serialization.StringDeserializer

spring.kafka.producer.value.deserializer:org.springframework.kafka.support.serializer.JsonSerializer




